# CUTEkit tool config
#
# Single source of truth for all tools. Edit this file, then run:
#   python3 2-generate.py
#
# Generated files (do not edit directly):
#   3-setup.sh                        — apt installs and curl-based installers
#   ~/.config/mise/config.toml        — all mise-managed tools
#   .zshrc.setup                      — shell init snippets (source this from your .zshrc)
#   4-post-install-steps.md
#   tool-reference.md

shell:
  family: zsh
  setup_file: .zshrc.setup
  defaults: |
    # === ZSH ENVIRONMENT ===
    # Use this if you don't have a preferred zsh setup

    # Set up the prompt
    autoload -Uz promptinit
    promptinit
    prompt adam1

    setopt histignorealldups sharehistory

    # Use emacs keybindings even if our EDITOR is set to vi
    #bindkey -e

    # Keep 1000 lines of history within the shell and save it to ~/.zsh_history:
    HISTSIZE=1000
    SAVEHIST=1000
    HISTFILE=~/.zsh_history

    # Use modern completion system
    autoload -Uz compinit
    compinit

    zstyle ':completion:*' auto-description 'specify: %d'
    zstyle ':completion:*' completer _expand _complete _correct _approximate
    zstyle ':completion:*' format 'Completing %d'
    zstyle ':completion:*' group-name ''
    zstyle ':completion:*' menu select=2
    eval "$(dircolors -b)"
    zstyle ':completion:*:default' list-colors ${(s.:.)LS_COLORS}
    zstyle ':completion:*' list-colors ''
    zstyle ':completion:*' list-prompt %SAt %p: Hit TAB for more, or the character to insert%s
    zstyle ':completion:*' matcher-list '' 'm:{a-z}={A-Z}' 'm:{a-zA-Z}={A-Za-z}' 'r:|[._-]=* r:|=*'
    zstyle ':completion:*' menu select=long
    zstyle ':completion:*' select-prompt %SScrolling active: current selection at %p%s
    zstyle ':completion:*' use-compctl false
    zstyle ':completion:*' verbose true

    zstyle ':completion:*:*:kill:*:processes' list-colors '=(#b) #([0-9]#)*=0=01;31'
    zstyle ':completion:*:kill:*' command 'ps -u $USER -o pid,%cpu,tty,cputime,cmd'

tools:

  # ══ EXAMPLES ═════════════════════════════════════════════════════════════════
  #
  # Keys shared by every backend:
  #   name          REQUIRED  human-friendly label (used in headings and messages only)
  #   backend       REQUIRED  how the tool is installed
  #   shell_setup   optional  list of lines written to .zshrc.setup
  #   post_install  optional  list of actionable steps written to 4-post-install-steps.md
  #   reference     optional  list of background notes written to tool-reference.md
  # ════════════════════════════════════════════════════════════════════════════

  # ── backend: apt ─────────────────────────────────────────────────────────
  # Use for anything available in the Ubuntu apt repository, intended for system tools.
  #
  # - name: some-system-tool      # REQUIRED  display label
  #   backend: apt                # initiates apt install
  #   package: some-system-tool   # REQUIRED  exact apt package name
  #   installed_check: "some-system-tool --version"
  #                               # optional  bash expression; setup is skipped if it exits 0
  #   custom_setup: |             # optional  runs before apt-get install
  #     sudo install -dm 755 /etc/apt/keyrings        #   use this to add a GPG key
  #     curl -fsSL https://example.com/key | ...      #   and a custom apt source
  #   apt_deps:                   # optional  extra apt packages installed before this tool
  #     - libssl-dev

  # ── backend: mise (registry lookup) ──────────────────────────────────────
  # Use for tools listed in the mise registry (https://mise.jdx.dev/registry.html).
  # `name` is used as the registry key — no `source` field needed.
  #
  # - name: some-tui-tool         # REQUIRED  must match the mise registry name exactly
  #   version: latest             # REQUIRED  "latest", "lts", or a pinned version like "1.2.3"

  # ── backend: github (via mise) ────────────────────────────────────────────
  # Downloads a release binary directly from a GitHub repo.
  # Use when the tool is not in the mise registry and mise will attempt to find a release binary.
  #
  # - name: some-github-tool      # REQUIRED  display label
  #   backend: github             # REQUIRED
  #   source: owner/repo          # REQUIRED  GitHub owner/repo (e.g. BurntSushi/ripgrep)
  #   version: latest             # REQUIRED

  # ── backend: npm ──────────────────────────────────────────────────────────
  # Installs a Node.js package globally via npm (managed by mise).
  # Requires the node entry below to be present in this config.
  #
  # - name: some-npm-tool         # REQUIRED  display label
  #   backend: npm                # REQUIRED
  #   source: "@scope/package"    # REQUIRED  npm package name, quoted if it starts with @
  #   version: latest             # REQUIRED

  # ── backend: curl ─────────────────────────────────────────────────────────
  # Last resort: pipes a remote script to bash (curl | bash).
  # Use only when no other backend can install the tool.
  #
  # - name: some-curl-tool        # REQUIRED  display label
  #   backend: curl               # REQUIRED
  #   url: https://example.com/install.sh   # REQUIRED  piped directly to bash
  #   installed_check: 'command -v some-curl-tool'
  #                               # optional but strongly recommended — skips re-install
  #   apt_deps:                   # optional  installed via apt before the curl command runs
  #     - some-apt-dep
  #   shell_setup:                # optional  commonly needed to add the tool to PATH
  #     - 'export PATH="$HOME/.some-curl-tool/bin:$PATH"'

  # ════════════════════════════════════════════════════════════════════════════
  # END EXAMPLES
  # ════════════════════════════════════════════════════════════════════════════

  # ── Bootstrap ──────────────────────────────────────────────────────────────
  # mise must be first: it installs everything in the aqua/github/cargo/etc sections.

  - name: mise
    backend: apt
    package: mise
    installed_check: "mise ls"
    custom_setup: |
      sudo install -dm 755 /etc/apt/keyrings
      curl -fsSL https://mise.jdx.dev/gpg-key.pub | sudo tee /etc/apt/keyrings/mise-archive-keyring.asc 1> /dev/null
      echo "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.asc] https://mise.jdx.dev/deb stable main" | sudo tee /etc/apt/sources.list.d/mise.list
    shell_setup:
      - 'eval "$(mise activate zsh)"'
    reference:
      - Installed via the official mise apt repo, not the Ubuntu default
      - Must be installed before any mise-managed tools are set up
      - 'For login shells (e.g. SSH sessions), add to ~/.zprofile: eval "$(mise activate zsh --shims)"'

  # ── System packages ────────────────────────────────────────────────────────

  - name: ca-certificates
    backend: apt
    package: ca-certificates

  - name: curl
    backend: apt
    package: curl

  - name: wget
    backend: apt
    package: wget

  - name: csh
    backend: apt
    package: csh

  - name: git
    backend: apt
    package: git
    reference:
      - 'Set your name: git config --global user.name "Your Name"'
      - 'Set your email: git config --global user.email "you@example.com"'

  - name: unzip
    backend: apt
    package: unzip

  - name: xz-utils
    backend: apt
    package: xz-utils

  - name: jq
    backend: apt
    package: jq
    reference:
      - 'JSON processor - useful in scripts for parsing API responses'

  - name: gnupg
    backend: apt
    package: gnupg

  - name: build-essential
    backend: apt
    package: build-essential

  - name: mc
    backend: apt
    package: mc
    reference:
      - 'Midnight Commander — two-pane terminal file manager'

  - name: btop
    backend: apt
    package: btop
    reference:
      - 'Resource monitor with a clean TUI'

  - name: ripgrep
    backend: apt
    package: ripgrep
    reference:
      - 'Fast recursive search; command is `rg`'

  - name: bat
    backend: apt
    package: bat
    reference:
      - 'cat replacement with syntax highlighting; installed as `batcat` on Ubuntu'
      - 'Create a symlink to use as `bat`: mkdir -p ~/.local/bin && ln -sf /usr/bin/batcat ~/.local/bin/bat'

  - name: git-delta
    backend: apt
    package: git-delta
    reference:
      - 'Syntax-highlighted diffs for git; configure in ~/.gitconfig'

  - name: visidata
    backend: apt
    package: visidata
    reference:
      - Terminal spreadsheet and CSV/JSON explorer; command is `vd`

  - name: qemu-guest-agent
    backend: apt
    package: qemu-guest-agent
    reference:
      - Required when running as a QEMU/KVM virtual machine; safe to skip on bare metal

  # ── TUI tools (via mise) ───────────────────────────────────────────────────

  - name: gh
    version: latest
    reference:
      - 'Authenticate after install: gh auth login'
      - 'Wire up git credentials: gh auth setup-git'

  - name: glow
    version: latest
    reference:
      - 'Markdown renderer for the terminal'

  - name: fzf
    version: latest
    shell_setup:
      - 'source <(fzf --zsh)'
    reference:
      - 'Fuzzy finder; required by navi'

  - name: navi
    version: latest
    shell_setup:
      - 'eval "$(navi widget zsh)"'
    reference:
      - 'Interactive cheatsheet tool - requires fzf'

  - name: lazygit
    version: latest
    reference:
      - Terminal UI for git

  - name: atuin
    version: latest
    shell_setup:
      - 'eval "$(atuin init zsh)"'
    reference:
      - 'Shell history sync and search - replaces Ctrl+R'

  - name: micro
    backend: aqua
    source: zyedidia/micro
    version: latest
    reference:
      - 'Terminal text editor with familiar keybindings (Ctrl+S, Ctrl+C, etc.)'

  - name: yazi
    version: latest
    reference:
      - 'Terminal file manager with image previews'

  # ── Curl installers ────────────────────────────────────────────────────────

  - name: zoxide
    backend: cargo
    source: zoxide
    version: latest
    shell_setup:
      - 'eval "$(zoxide init zsh)"'
    reference:
      - 'Smarter cd - use `z` to jump to frequently visited directories'

  # ── Post Install ──────────────────────────────────────────────────────────
  # These tools have post-install notes and are grouped here in the order
  # the steps should be performed.

  - name: zsh
    backend: apt
    package: zsh
    post_install:
      - 'Configure your shell'
      - 'Fresh install (recommended): cp .zshrc.setup ~/.zshrc'
      - 'Existing .zshrc: add the REQUIRED TOOL-SPECIFIC ENTRIES section from .zshrc.setup to your config'
      - 'Set zsh as your default shell: chsh -s $(which zsh)'
      - 'Log out and back in for the change to take effect'

  - name: zellij
    version: latest
    shell_setup:
      - 'eval "$(zellij setup --generate-auto-start zsh)"'
    post_install:
      - 'Zellij will autostart on SSH login once .zshrc.setup is sourced'
      - 'To enable the web terminal, add to ~/.config/zellij/config.kdl: start_web_server true'
      - 'Or enable it from the session manager (Ctrl o + s)'
      - 'Create a login token (shown once — save it): zellij web --create-token'
      - 'Point your reverse proxy at http://localhost:8082'

  - name: openssh-server
    backend: apt
    package: openssh-server
    post_install:
      - 'After confirming key-based login works, disable password auth'
      - 'Create /etc/ssh/sshd_config.d/99-hardening.conf and add: PasswordAuthentication no'
      - 'Reload sshd: sudo systemctl reload ssh'

# ── Optional runtimes (required for certain backends) ──────────────────────
  # Uncomment the runtime for any backend you plan to use.

# Uncomment if you use the npm backend
  - name: node
    version: lts

  # Uncomment if you use the cargo backend
  - name: rust
    version: latest

  # Uncomment if you use the go backend
  # - name: go
  #   version: latest

  # Uncomment if you use the gem backend
  # - name: ruby
