# CUTEkit tool config
#
# Single source of truth for all tools. Edit this file, then run:
#   python3 2-generate.py
#
# Generated files (do not edit directly):
#   3-setup.sh                        — apt installs and curl-based installers
#   ~/.config/mise/config.toml        — all mise-managed tools
#   .zshrc.setup                      — shell init snippets (source this from your .zshrc)
#   4-post-install-steps.md
#   tool-reference.md

shell:
  family: zsh
  setup_file: .zshrc.setup

tools:

  # ── Bootstrap ──────────────────────────────────────────────────────────────
  # mise must be first: it installs everything in the aqua/github/cargo/etc sections.

  - name: mise
    backend: apt
    package: mise
    installed_check: "mise ls"
    custom_setup: |
      sudo install -dm 755 /etc/apt/keyrings
      curl -fsSL https://mise.jdx.dev/gpg-key.pub | sudo tee /etc/apt/keyrings/mise-archive-keyring.asc 1> /dev/null
      echo "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.asc] https://mise.jdx.dev/deb stable main" | sudo tee /etc/apt/sources.list.d/mise.list
    reference:
      - Installed via the official mise apt repo, not the Ubuntu default
      - Must be installed before any mise-managed tools are set up

  # ── System packages ────────────────────────────────────────────────────────

  - name: ca-certificates
    backend: apt
    package: ca-certificates

  - name: curl
    backend: apt
    package: curl

  - name: wget
    backend: apt
    package: wget

  - name: git
    backend: apt
    package: git
    post_install:
      - Set your identity: git config --global user.name "Your Name"
      - Set your identity: git config --global user.email "you@example.com"

  - name: unzip
    backend: apt
    package: unzip

  - name: xz-utils
    backend: apt
    package: xz-utils

  - name: jq
    backend: apt
    package: jq
    reference:
      - JSON processor — useful in scripts for parsing API responses

  - name: gnupg
    backend: apt
    package: gnupg

  - name: build-essential
    backend: apt
    package: build-essential

  - name: zsh
    backend: apt
    package: zsh

  - name: csh
    backend: apt
    package: csh
    post_install:
      - Set zsh as your default shell: chsh -s $(which zsh)
      - Re-login or run `exec zsh` to activate it

  - name: mc
    backend: apt
    package: mc
    reference:
      - Midnight Commander — two-pane terminal file manager

  - name: btop
    backend: apt
    package: btop
    reference:
      - Resource monitor with a clean TUI

  - name: ripgrep
    backend: apt
    package: ripgrep
    reference:
      - Fast recursive search; command is `rg`

  - name: bat
    backend: apt
    package: bat
    post_install:
      - Ubuntu installs bat as `batcat` — create a symlink to use it as `bat`
      - Run: mkdir -p ~/.local/bin && ln -sf /usr/bin/batcat ~/.local/bin/bat
    reference:
      - cat replacement with syntax highlighting; installed as `batcat` on Ubuntu

  - name: git-delta
    backend: apt
    package: git-delta
    reference:
      - Syntax-highlighted diffs for git; configure in ~/.gitconfig

  - name: visidata
    backend: apt
    package: visidata
    reference:
      - Terminal spreadsheet and CSV/JSON explorer; command is `vd`

  - name: openssh-server
    backend: apt
    package: openssh-server
    post_install:
      - After confirming key-based login works, disable password auth
      - Create /etc/ssh/sshd_config.d/99-hardening.conf and add PasswordAuthentication no
      - Then reload: sudo systemctl reload ssh
    reference:
      - Required for the SSH-first workflow

  - name: qemu-guest-agent
    backend: apt
    package: qemu-guest-agent
    reference:
      - Required when running as a QEMU/KVM virtual machine; safe to skip on bare metal

  # ── TUI tools (via mise) ───────────────────────────────────────────────────

  - name: gh
    version: latest
    post_install:
      - Authenticate: gh auth login
      - Wire up git credentials: gh auth setup-git

  - name: glow
    version: latest
    reference:
      - Markdown renderer for the terminal

  - name: fzf
    version: latest
    shell_setup:
      - 'source <(fzf --zsh)'
    reference:
      - Fuzzy finder; required by navi

  - name: navi
    version: latest
    shell_setup:
      - 'eval "$(navi widget zsh)"'
    reference:
      - Interactive cheatsheet tool — requires fzf

  - name: zellij
    version: latest
    shell_setup:
      - 'eval "$(zellij setup --generate-auto-start zsh)"'
    post_install:
      - Zellij will autostart on SSH login once .zshrc.setup is sourced
      - To enable the web terminal, add to ~/.config/zellij/config.kdl: start_web_server true
      - Or enable it from the session manager (Ctrl o + s)
      - Create a login token (shown once — save it): zellij web --create-token
      - Point your reverse proxy at http://localhost:8082
    reference:
      - Terminal multiplexer — preferred over tmux

  - name: lazygit
    version: latest
    reference:
      - Terminal UI for git

  - name: atuin
    version: latest
    shell_setup:
      - 'eval "$(atuin init zsh)"'
    reference:
      - Shell history sync and search — replaces Ctrl+R

  - name: micro
    version: latest
    reference:
      - Terminal text editor with familiar keybindings (Ctrl+S, Ctrl+C, etc.)

  - name: yazi
    version: latest
    reference:
      - Terminal file manager with image previews

  # ── Curl installers ────────────────────────────────────────────────────────

  - name: zoxide
    backend: curl
    url: https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh
    installed_check: "command -v zoxide"
    shell_setup:
      - 'eval "$(zoxide init zsh)"'
    reference:
      - Smarter cd — use `z` to jump to frequently visited directories

  - name: pyenv
    backend: curl
    url: https://pyenv.run
    installed_check: '[ -d "$HOME/.pyenv" ]'
    apt_deps:
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - libncursesw5-dev
      - libffi-dev
      - liblzma-dev
      - tk-dev
    shell_setup:
      - 'export PYENV_ROOT="$HOME/.pyenv"'
      - '[[ -d "$PYENV_ROOT/bin" ]] && export PATH="$PYENV_ROOT/bin:$PATH"'
      - 'eval "$(pyenv init - zsh)"'
      - 'if [[ -d "$PYENV_ROOT/plugins/pyenv-virtualenv" ]]; then eval "$(pyenv virtualenv-init -)"; fi'
    reference:
      - Python version manager installed into ~/.pyenv

