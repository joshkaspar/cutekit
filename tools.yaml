
# cutekit/tools.yaml — single source of truth
# Edit this file, then run: python3 generate.py
# DO NOT edit bootstrap.sh or maintenance.sh directly — they are generated.

shell: zsh

paths:
  - ~/.local/bin
  - ~/.npm-global/bin

# ── APT ─────────────────────────────────────────────────────────────────────
# Plain list. Installed early, updated via apt upgrade.
apt:
  - ca-certificates
  - curl
  - wget
  - git
  - unzip
  - xz-utils
  - jq
  - gnupg
  - build-essential
  - zsh
  - mc
  - btop
  - ripgrep
  - openssh-server
  - qemu-guest-agent

# ── APT-REPO TOOLS ──────────────────────────────────────────────────────────
# Packages that need a third-party apt repo added first.
apt_repos:
  - name: gh
    package: gh
    action_required: "gh auth login"
    key_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    key_path: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    source: "deb [arch={arch} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    source_file: /etc/apt/sources.list.d/github-cli.list

  - name: nodejs
    package: nodejs
    setup_script: https://deb.nodesource.com/setup_lts.x

  - name: glow
    package: glow
    note: "Markdown renderer — from Charm"
    key_url: https://repo.charm.sh/apt/gpg.key
    key_path: /etc/apt/keyrings/charm.gpg
    key_dearmor: true
    source: "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *"
    source_file: /etc/apt/sources.list.d/charm.list

# ── GITHUB RELEASE BINARIES ─────────────────────────────────────────────────
# Fetched from latest GitHub release, extracted, dropped in ~/.local/bin.
# Version-checked and updated on every maintenance run.
github_releases:
  - name: zellij
    repo: zellij-org/zellij
    note: "Terminal multiplexer (prefer over tmux)"
    url: "https://github.com/{repo}/releases/download/v{version}/zellij-x86_64-unknown-linux-musl.tar.gz"
    binary: zellij
    version_cmd: "zellij --version | awk '{print $2}'"

  - name: lazygit
    repo: jesseduffield/lazygit
    url: "https://github.com/{repo}/releases/download/v{version}/lazygit_{version}_Linux_x86_64.tar.gz"
    binary: lazygit
    version_cmd: "lazygit --version | sed -n 's/.*version=\\([^, ]*\\).*/\\1/p'"

# ── NPM GLOBALS ─────────────────────────────────────────────────────────────
npm:
  - name: "@openai/codex"
    bin: codex
    action_required: "Set OPENAI_API_KEY in your shell, or run: codex  (follow prompts)"

# ── CURL INSTALLERS ─────────────────────────────────────────────────────────
# Pipe-to-bash installers. check: is a bash expression — skipped if it exits 0.
curl_installers:
  - name: pyenv
    url: https://pyenv.run
    check: "[ -d \"$HOME/.pyenv\" ]"
    apt_deps:
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - libncursesw5-dev
      - libffi-dev
      - liblzma-dev
      - tk-dev
    zshrc_block:
      marker: "# --- workbench: pyenv ---"
      content: |
        export PYENV_ROOT="$HOME/.pyenv"
        [[ -d "$PYENV_ROOT/bin" ]] && export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init - zsh)"
        if [[ -d "$PYENV_ROOT/plugins/pyenv-virtualenv" ]]; then
          eval "$(pyenv virtualenv-init -)"
        fi
    maintenance: git-pull   # update via git -C ~/.pyenv pull

  - name: claude
    url: https://claude.ai/install.sh
    check: "command -v claude || [ -x \"$HOME/.local/bin/claude\" ]"
    note: "Claude Code CLI — self-updates, no maintenance step needed"
    action_required: "claude  # follow prompts to authenticate"

# ── GIT CLONES ──────────────────────────────────────────────────────────────
# Cloned into ~ on bootstrap, updated via git pull on maintenance.
git_clones:
  - name: zsh-completions
    url: https://github.com/zsh-users/zsh-completions.git
    dest: ~/.zsh/zsh-completions
    depth: 1
    zshrc_block:
      marker: "# --- workbench: zsh-completions ---"
      content: 'fpath=("$HOME/.zsh/zsh-completions/src" $fpath)'

# ── SERVICES ────────────────────────────────────────────────────────────────
services:
  - ssh
  - qemu-guest-agent

# ── POST-BOOTSTRAP NOTES ────────────────────────────────────────────────────
# Global notes not tied to a specific tool.
post_bootstrap_notes:
  - "Re-login (or: exec zsh) to activate new default shell and PATH."
  - |
    SSH hardening: after confirming key-based login works, edit
      /etc/ssh/sshd_config.d/99-workbench-hardening.conf
    and uncomment: PasswordAuthentication no
    then: sudo systemctl reload ssh
